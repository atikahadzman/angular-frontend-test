<mat-card class="donut-box">
    <mat-card-header class="custom-header">
        <mat-card-title>Donut Chart</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <div *ngIf="chartOptions">
            <apx-chart
                [series]="chartOptions.series"
                [chart]="chartOptions.chart"
                [labels]="chartOptions.labels">
            </apx-chart>
        </div>
    </mat-card-content>
</mat-card>
