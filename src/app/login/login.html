<div class="login-wrapper">
    <div class="login-box">
        <h2>Sign in to your dashboard</h2>

        <p class="error" *ngIf="errorMessage">
            {{ errorMessage }}
        </p>
        
        <form (ngSubmit)="login()">
            <div class="form-group">
                <input
                    type="email"
                    name="username"
                    [(ngModel)]="username"
                    placeholder="Username"
                    required
                />
            </div>

            <div class="form-group">
                <input 
                    type="password"
                    name="password"
                    [(ngModel)]="password"
                    placeholder="Password"
                    required
                />
            </div>

            <button
                type="submit"
                class="btn btn-primary"
                [disabled]="loading">

                {{ loading ? 'Signing in...' : 'Sign in' }}
            </button>
        </form>
    </div>
</div>
